<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multilingual Dictionary</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }

    .header {
      background: #fff; border-bottom: 2px solid #222; padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .header h1 { font-size: 1.3rem; font-weight: 600; }
    .header .right { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .download-btn {
      background: #222; color: #fff; border: none; padding: 8px 16px; font-size: 0.9rem; cursor: pointer;
    }
    .download-btn:hover { background: #444; }

    .container { max-width: 900px; margin: 0 auto; padding: 24px; }

    /* Stats */
    .stats-bar {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px;
      font-size: 0.9rem; color: #555;
    }
    .stat-lang {
      background: #fff; border: 1px solid #ddd; padding: 8px 14px; border-radius: 4px;
      cursor: pointer;
    }
    .stat-lang:hover { border-color: #888; }
    .stat-lang.active { border-color: #222; font-weight: 600; }
    .stat-lang .count { font-weight: 600; color: #222; }

    /* Search */
    .search-section { margin-bottom: 24px; }
    .search-box { display: flex; gap: 8px; }
    .search-box input {
      flex: 1; padding: 10px 14px; font-size: 1rem; border: 2px solid #222; outline: none;
    }
    .search-box input:focus { border-color: #555; }
    .search-box button {
      padding: 10px 20px; font-size: 1rem; background: #222; color: #fff; border: none; cursor: pointer;
    }
    .search-box button:hover { background: #444; }

    /* Results */
    .results {
      background: #fff; border: 2px solid #222; min-height: 200px; max-height: 600px;
      overflow-y: auto; padding: 16px; margin-bottom: 24px;
    }
    .results.empty { display: flex; align-items: center; justify-content: center; color: #999; }

    .result-entry { padding: 12px 0; border-bottom: 1px solid #eee; }
    .result-entry:last-child { border-bottom: none; }

    .result-header { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
    .result-word { font-weight: 700; font-size: 1.15rem; }
    .result-dict-lang {
      font-size: 0.75rem; color: #fff; background: #555; padding: 1px 5px; border-radius: 3px;
    }
    .result-ipa { font-size: 0.85rem; color: #666; }
    .result-pos { font-size: 0.8rem; color: #fff; background: #888; padding: 1px 6px; border-radius: 3px; }
    .result-expression-of { font-size: 0.8rem; color: #888; }

    .lang-block { margin: 6px 0 6px 12px; }
    .lang-flag { font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 2px; }
    .lang-def { margin: 2px 0 2px 8px; display: flex; align-items: baseline; gap: 6px; }
    .lang-def-text { color: #333; }
    .lang-def-hint { color: #999; font-size: 0.8rem; }

    .quality-dots { display: inline-flex; gap: 2px; margin-left: 4px; }
    .quality-dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; display: inline-block; }
    .quality-dot.filled { background: #4a4; }
    .quality-dot.filled.low { background: #c93; }
    .quality-dot.filled.vlow { background: #c55; }

    .example { margin: 3px 0 3px 20px; font-size: 0.9rem; color: #666; font-style: italic; }
    .result-source { font-size: 0.75rem; color: #aaa; margin-top: 4px; margin-left: 12px; }

    /* Add words */
    .add-section h2 { font-size: 1.1rem; margin-bottom: 12px; font-weight: 600; }
    .add-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; font-size: 0.9rem; flex-wrap: wrap; }
    .add-row label { min-width: 50px; }
    .add-row input, .add-row select {
      padding: 6px 10px; border: 2px solid #222; font-size: 0.9rem;
    }
    .add-textarea {
      width: 100%; min-height: 200px; padding: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.9rem;
      border: 2px solid #222; resize: vertical; outline: none;
    }
    .add-textarea:focus { border-color: #555; }
    .add-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .add-footer button {
      padding: 10px 24px; font-size: 1rem; background: #222; color: #fff; border: none; cursor: pointer;
    }
    .add-footer button:hover { background: #444; }
    .add-footer .message { font-size: 0.9rem; color: #555; }
    .add-footer .message.success { color: #2a7d2a; }
    .add-footer .message.error { color: #c33; }
  </style>
</head>
<body>

<div class="header">
  <h1>Multilingual Dictionary</h1>
  <div class="right">
    <button class="download-btn" onclick="downloadDict()">Download .mobi</button>
  </div>
</div>

<div class="container">
  <div class="stats-bar" id="stats-bar"></div>

  <div class="search-section">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search across all dictionaries..." autofocus>
      <button onclick="doSearch()">Search</button>
    </div>
  </div>

  <div class="results empty" id="results">Type a word to search</div>

  <div class="add-section">
    <h2>Add new words</h2>
    <div class="add-row">
      <label for="add-lang">Dict:</label>
      <select id="add-lang">
        <option value="nl">Dutch (nl)</option>
        <option value="en">English (en)</option>
      </select>
      <label for="add-target">To:</label>
      <select id="add-target">
        <option value="hu">Hungarian (hu)</option>
        <option value="en">English (en)</option>
        <option value="nl">Dutch (nl)</option>
        <option value="es">Spanish (es)</option>
      </select>
      <label for="source-input">Source:</label>
      <input type="text" id="source-input" placeholder="e.g. book title">
    </div>
    <textarea class="add-textarea" id="add-textarea" placeholder="Paste words here, one per line:

fiets - bicikli
het ventiel - szelep
bekommeren - aggódni
[ik bekommerd me niet - nem aggódom]"></textarea>
    <div class="add-footer">
      <span class="message" id="add-message"></span>
      <button onclick="importWords()">Import</button>
    </div>
  </div>
</div>

<script>
  const LANG_LABELS = {
    hu: '🇭🇺 Magyar', en: '🇬🇧 English', es: '🇪🇸 Español',
    nl: '🇳🇱 Nederlands', de: '🇩🇪 Deutsch', fr: '🇫🇷 Français',
  };
  const LANG_ORDER = ['hu', 'en', 'es', 'de', 'fr', 'nl'];

  let activeFilter = '';  // empty = all

  const searchInput = document.getElementById('search-input');
  const resultsDiv = document.getElementById('results');

  fetchStats();
  searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
  let debounceTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(doSearch, 300);
  });

  async function fetchStats() {
    const res = await fetch('/api/stats');
    const data = await res.json();
    const bar = document.getElementById('stats-bar');

    // "All" button
    let html = `<div class="stat-lang ${!activeFilter ? 'active' : ''}" onclick="setFilter('')">
      All: <span class="count">${Object.values(data).reduce((s,d) => s + d.total, 0).toLocaleString()}</span>
    </div>`;

    for (const [lang, s] of Object.entries(data)) {
      const label = LANG_LABELS[lang] || lang;
      const active = activeFilter === lang ? 'active' : '';
      html += `<div class="stat-lang ${active}" onclick="setFilter('${lang}')">
        ${label}: <span class="count">${s.total.toLocaleString()}</span>
        <span style="color:#999; font-size:0.8rem">(${s.expressions} expr)</span>
      </div>`;
    }
    bar.innerHTML = html;

    // Update add-lang dropdown with available languages
    const addLang = document.getElementById('add-lang');
    const currentVal = addLang.value;
    addLang.innerHTML = '';
    for (const lang of Object.keys(data)) {
      const opt = document.createElement('option');
      opt.value = lang;
      opt.textContent = `${LANG_LABELS[lang] || lang} (${lang})`;
      addLang.appendChild(opt);
    }
    addLang.value = currentVal || 'nl';
  }

  function setFilter(lang) {
    activeFilter = lang;
    fetchStats();
    doSearch();
  }

  async function doSearch() {
    const query = searchInput.value.trim();
    if (!query) {
      resultsDiv.className = 'results empty';
      resultsDiv.innerHTML = 'Type a word to search';
      return;
    }
    let url = `/api/search?q=${encodeURIComponent(query)}`;
    if (activeFilter) url += `&lang=${activeFilter}`;
    const res = await fetch(url);
    const entries = await res.json();
    if (entries.length === 0) {
      resultsDiv.className = 'results empty';
      resultsDiv.innerHTML = 'No results found';
      return;
    }
    resultsDiv.className = 'results';
    resultsDiv.innerHTML = entries.map(renderEntry).join('');
  }

  function renderEntry(entry) {
    let html = '<div class="result-entry">';
    html += '<div class="result-header">';
    html += `<span class="result-word">${esc(entry.word)}</span>`;
    if (entry._lang) html += `<span class="result-dict-lang">${entry._lang}</span>`;
    if (entry.ipa) html += `<span class="result-ipa">${esc(entry.ipa)}</span>`;
    if (entry.pos) html += `<span class="result-pos">${esc(entry.pos)}</span>`;
    if (entry.expression_of) html += `<span class="result-expression-of">→ ${esc(entry.expression_of)}</span>`;
    html += '</div>';

    const translations = entry.translations || {};
    const sortedLangs = LANG_ORDER.filter(l => l in translations);
    for (const l of Object.keys(translations)) {
      if (!sortedLangs.includes(l)) sortedLangs.push(l);
    }
    for (const lang of sortedLangs) {
      const trans = translations[lang];
      const label = LANG_LABELS[lang] || lang;
      html += '<div class="lang-block">';
      html += `<div class="lang-flag">${label}</div>`;
      for (const d of (trans.definitions || [])) {
        html += '<div class="lang-def">';
        html += `<span class="lang-def-text">${esc(d.text)}</span>`;
        if (d.english_hint) html += `<span class="lang-def-hint">(${esc(d.english_hint)})</span>`;
        html += renderQuality(d.quality || 0);
        html += '</div>';
      }
      for (const ex of (trans.examples || [])) {
        html += `<div class="example">"${esc(ex.nl)}" — ${esc(ex.tr)}</div>`;
      }
      html += '</div>';
    }
    if (entry.source) html += `<div class="result-source">source: ${esc(entry.source)}</div>`;
    html += '</div>';
    return html;
  }

  function renderQuality(q) {
    let html = '<span class="quality-dots" title="quality: ' + q + '/5">';
    for (let i = 1; i <= 5; i++) {
      let cls = 'quality-dot';
      if (i <= q) { cls += ' filled'; if (q <= 1) cls += ' vlow'; else if (q <= 2) cls += ' low'; }
      html += `<span class="${cls}"></span>`;
    }
    return html + '</span>';
  }

  function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function importWords() {
    const text = document.getElementById('add-textarea').value.trim();
    if (!text) { showMessage('Please paste some words first.', 'error'); return; }
    const lang = document.getElementById('add-lang').value;
    const targetLang = document.getElementById('add-target').value;
    const source = document.getElementById('source-input').value.trim() || 'web-import';
    const res = await fetch('/api/import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, source, lang, target_lang: targetLang }),
    });
    const data = await res.json();
    if (data.error) {
      showMessage(data.error, 'error');
    } else {
      showMessage(data.message, 'success');
      if (data.added > 0) { document.getElementById('add-textarea').value = ''; fetchStats(); }
    }
  }

  function showMessage(msg, type) {
    const el = document.getElementById('add-message');
    el.textContent = msg;
    el.className = `message ${type}`;
    setTimeout(() => { el.textContent = ''; }, 5000);
  }

  function downloadDict() { window.location.href = '/api/download'; }
</script>

</body>
</html>
